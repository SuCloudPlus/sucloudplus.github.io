<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Markdown编辑器</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/markdown/markdown.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/search/searchcursor.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root { --bg: #f8f9fb; --border: #e1e4e8; --accent: #2188ff; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* 顶部两层工具栏 */
        .top-nav { background: #fff; border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 10; }
        .nav-row-1 { display: flex; align-items: center; padding: 10px 20px; gap: 15px; border-bottom: 1px solid #f0f0f0; }
        .nav-row-2 { display: flex; align-items: center; padding: 8px 20px; gap: 20px; background: #fafbfc; }

        #filename { border: 1px solid var(--border); padding: 5px 10px; border-radius: 4px; width: 220px; outline: none; }
        .btn { padding: 5px 12px; border: 1px solid var(--border); background: #fff; border-radius: 4px; cursor: pointer; font-size: 13px; display: inline-flex; align-items: center; }
        .btn:hover { background: #f3f4f6; }
        .btn-primary { background: var(--accent); color: #fff; border: none; }
        .input-tool { border: 1px solid var(--border); padding: 4px 8px; border-radius: 4px 0 0 4px; width: 120px; font-size: 13px; outline: none; }
        .btn-append { border-left: none; border-radius: 0 4px 4px 0; background: #eee; padding: 4px 8px; }

        /* 主舞台布局 */
        .main-stage { display: flex; flex: 1; overflow: hidden; padding: 0 50px; /* 两侧留空 */ }
        
        /* 左：目录 */
        #toc-pane { width: 220px; border-right: 1px solid var(--border); overflow-y: auto; padding: 15px; background: #fff; }
        .toc-item { display: block; color: #444; text-decoration: none; padding: 6px 0; font-size: 14px; cursor: pointer; border-left: 2px solid transparent; padding-left: 8px; }
        .toc-item:hover { color: var(--accent); background: #f0f7ff; }
        .toc-h1 { font-weight: bold; }
        .toc-h2 { padding-left: 15px; font-size: 13px; color: #666; }

        /* 中：编辑器与预览 */
        #workspace { flex: 1; display: flex; background: #fff; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
        .CodeMirror { flex: 1; height: 100% !important; font-size: 15px; line-height: 1.7; }
        
        /* 预览区 */
        #preview-pane { 
            width: 0; /* 默认折叠 */
            overflow-y: auto; background: #fff; transition: width 0.3s ease;
            border-left: 0 solid var(--border);
        }
        #preview-pane.active { width: 50%; border-left-width: 1px; padding: 0 25px; }

        /* 预览行号样式修复 */
        .line-wrap { position: relative; padding-left: 45px; min-height: 1.7em; }
        .line-num { position: absolute; left: 0; color: #ccc; font-family: monospace; font-size: 13px; width: 35px; text-align: right; border-right: 1px solid #eee; padding-right: 8px; user-select: none; }

        /* 右：快捷跳转按钮 */
        #side-control { width: 60px; display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 15px; flex-shrink: 0; }
    </style>
</head>
<body>

<header class="top-nav">
    <div class="nav-row-1">
        <span style="font-weight: bold; font-size: 18px;">Markdown编辑器</span>
        <input type="text" id="filename" value="我的文档">
        <div style="margin-left: auto; display: flex; gap: 8px;">
            <button class="btn btn-primary" onclick="togglePreview()">预览开关</button>
            <button class="btn" onclick="exportFile('md')">导出 .MD</button>
            <button class="btn" onclick="exportFile('txt')">导出 .TXT</button>
        </div>
    </div>
    <div class="nav-row-2">
        <div style="display: flex; align-items: center;">
            <span style="font-size: 13px; margin-right: 5px;">查找:</span>
            <input type="text" id="search-box" class="input-tool" placeholder="关键字...">
            <button class="btn btn-append" onclick="doSearch()">确定</button>
        </div>
        <div style="display: flex; align-items: center;">
            <span style="font-size: 13px; margin-right: 5px;">跳转:</span>
            <input type="number" id="jump-box" class="input-tool" placeholder="行号...">
            <button class="btn btn-append" onclick="gotoLine(document.getElementById('jump-box').value)">跳转</button>
        </div>
        <div id="status-bar" style="margin-left: auto; font-size: 12px; color: #999;">准备就绪</div>
    </div>
</header>

<div class="main-stage">
    <nav id="toc-pane"></nav>
    <main id="workspace">
        <textarea id="real-input"></textarea>
        <div id="preview-pane"></div>
    </main>
    <aside id="side-control">
        <button class="btn" title="回至顶部" onclick="cm.scrollTo(null, 0)">↑</button>
        <button class="btn" title="跳至底部" onclick="cm.scrollTo(null, cm.getScrollInfo().height)">↓</button>
    </aside>
</div>

<script>
    // 1. 初始化 CodeMirror
    const cm = CodeMirror.fromTextArea(document.getElementById('real-input'), {
        mode: 'markdown',
        lineNumbers: true,
        lineWrapping: false,
        styleActiveLine: true,
        theme: 'default'
    });

    const preview = document.getElementById('preview-pane');
    const toc = document.getElementById('toc-pane');

    // 2. 渲染逻辑：修复 [object Object] 并实现行号对齐
    function updatePreview() {
        const content = cm.getValue();
        const lines = content.split('\n');
        
        let htmlContent = '';
        lines.forEach((line, index) => {
            // 确保渲染结果是字符串
            const rendered = line.trim() === '' ? '&nbsp;' : marked.parse(line);
            htmlContent += `<div class="line-wrap"><span class="line-num">${index + 1}</span>${rendered}</div>`;
        });
        
        preview.innerHTML = htmlContent;
        updateTOC(lines);
        updateStatus();
    }

    cm.on('change', () => {
        updatePreview();
        localStorage.setItem('md_content_final', cm.getValue());
    });

    // 同步滚动
    cm.on('scroll', () => {
        const info = cm.getScrollInfo();
        const ratio = info.top / (info.height - info.clientHeight);
        preview.scrollTop = ratio * (preview.scrollHeight - preview.clientHeight);
    });

    // 3. 功能函数
    function togglePreview() {
        preview.classList.toggle('active');
        if (preview.classList.contains('active')) updatePreview();
    }

    function doSearch() {
        const q = document.getElementById('search-box').value;
        if (!q) return;
        const cursor = cm.getSearchCursor(q);
        if (cursor.findNext()) {
            cm.setSelection(cursor.from(), cursor.to());
            cm.scrollIntoView({from: cursor.from(), to: cursor.to()}, 150);
        } else {
            alert("未找到内容");
        }
    }

    function gotoLine(n) {
        const line = parseInt(n) - 1;
        if (line >= 0 && line < cm.lineCount()) {
            cm.setCursor(line, 0);
            cm.focus();
        }
    }

    function updateTOC(lines) {
        let html = '';
        lines.forEach((line, i) => {
            const m = line.match(/^(#{1,2})\s+(.*)/);
            if (m) {
                const level = m[1].length;
                const text = m[2].replace(/<[^>]*>/g, ''); // 纯文本
                html += `<a class="toc-item toc-h${level}" onclick="gotoLine(${i+1})">${text}</a>`;
            }
        });
        toc.innerHTML = html;
    }

    function updateStatus() {
        const cur = cm.getCursor();
        document.getElementById('status-bar').innerText = `行: ${cur.line + 1} | 总行数: ${cm.lineCount()} | 字数: ${cm.getValue().length}`;
    }

    function exportFile(ext) {
        const blob = new Blob([cm.getValue()], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${document.getElementById('filename').value}.${ext}`;
        a.click();
    }

    // 初始加载
    window.onload = () => {
        const saved = localStorage.getItem('md_content_final');
        if (saved) cm.setValue(saved);
        else cm.setValue("");
        updatePreview();
    };
</script>

</body>
</html>
