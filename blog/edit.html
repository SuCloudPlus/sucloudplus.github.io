<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>编辑器 - 加密博客系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <style>
        :root { --bg: #f8f9fb; --border: #e1e4e8; --accent: #2188ff; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .top-nav { background: #fff; border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 10; }
        .nav-row-1 { display: flex; align-items: center; padding: 10px 20px; gap: 15px; border-bottom: 1px solid #f0f0f0; }
        .nav-row-2 { display: flex; align-items: center; padding: 8px 20px; gap: 20px; background: #fafbfc; }
        
        /* 文件名编辑区样式 */
        .name-editor { display: flex; align-items: center; background: #f0f2f5; border: 1px solid var(--border); border-radius: 4px; padding: 0 10px; flex: 1; max-width: 500px; }
        #static-time { color: #888; font-family: monospace; font-size: 13px; padding-right: 8px; border-right: 1px solid #ddd; user-select: none; }
        #filename { border: none; background: transparent; padding: 8px 10px; width: 100%; outline: none; font-size: 14px; font-weight: 500; }
        #filename:focus { background: #fff; }

        .btn { padding: 5px 12px; border: 1px solid var(--border); background: #fff; border-radius: 4px; cursor: pointer; font-size: 13px; display: inline-flex; align-items: center; gap: 4px; }
        .btn:hover { background: #f3f4f6; }
        .btn-primary { background: var(--accent); color: #fff; border: none; }
        .btn-save { background: #28a745; color: #fff; border: none; margin-left: 10px; }
        
        .main-stage { display: flex; flex: 1; overflow: hidden; padding: 0 20px; }
        #toc-pane { width: 220px; border-right: 1px solid var(--border); overflow-y: auto; padding: 15px; background: #fff; }
        #workspace { flex: 1; display: flex; background: #fff; border-left: 1px solid var(--border); }
        .CodeMirror { flex: 1; height: 100% !important; font-size: 15px; line-height: 1.7; }
        #preview-pane { width: 0; overflow-y: auto; background: #fff; transition: width 0.3s ease; }
        #preview-pane.active { width: 50%; border-left: 1px solid var(--border); padding: 0 25px; }
        
        .save-status { font-weight: bold; font-size: 12px; }
        .status-syncing { color: var(--accent); }
        .status-success { color: #28a745; }
        .status-dirty { color: #e65100; }
        
        .toc-item { display: block; padding: 6px 10px; color: #444; text-decoration: none; cursor: pointer; border-radius: 4px; font-size: 13px; }
        .toc-item:hover { background: #f0f7ff; color: var(--accent); }
        .toc-h1 { font-weight: bold; }
        .toc-h2 { padding-left: 20px; color: #666; }
    </style>

    <script src="https://sucloudplus.github.io/assets/config.js"></script> 
    <script src="https://sucloudplus.github.io/assets/crypto-helper.js"></script>
    <script src="https://sucloudplus.github.io/assets/gist-helper.js"></script>
    <script src="https://sucloudplus.github.io/assets/blog-naming-helper.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/markdown/markdown.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<header class="top-nav">
    <div class="nav-row-1">
        <button class="btn" onclick="location.href='index.html'">← 返回</button>
        <div class="name-editor">
            <span id="static-time">00000000000000</span>
            <input type="text" id="filename" placeholder="文章标题...">
        </div>
        <div style="margin-left: auto; display: flex; gap: 8px;">
            <button class="btn" onclick="exportFile('md')">导出 .md</button>
            <button class="btn" onclick="exportFile('txt')">导出 .txt</button>
            <button class="btn btn-primary" onclick="togglePreview()">预览</button>
            <button class="btn btn-save" onclick="manualSave()">立即保存</button>
        </div>
    </div>
    <div class="nav-row-2">
        <div id="status-bar" style="font-size: 12px; color: #999;">准备就绪</div>
        <div id="auto-save-status" class="save-status" style="margin-left: auto;"></div>
    </div>
</header>

<div class="main-stage">
    <nav id="toc-pane"></nav>
    <main id="workspace">
        <textarea id="real-input"></textarea>
        <div id="preview-pane"></div>
    </main>
</div>

<script>
    let cm, userConfig = null, articleInfo = { type: '', idPrefix: '', rawFileName: '' };
    let isDirty = false;
    let originalTitle = ""; // 用于对比是否修改了文件名

    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
    }

    window.onload = async function() {
        const params = new URLSearchParams(window.location.search);
        articleInfo.type = params.get('type') || 'Public';
        articleInfo.idPrefix = params.get('id');

        const session = getCookie("blog_session");
        if (articleInfo.type === 'Private') {
            if (!session) { location.href='index.html'; return; }
            userConfig = JSON.parse(decodeURIComponent(session));
        }

        initEditor();
        await loadAndDecrypt();
        setInterval(autoSave, 30000);
    };

    function initEditor() {
        cm = CodeMirror.fromTextArea(document.getElementById('real-input'), {
            mode: 'markdown',
            lineNumbers: true,
            lineWrapping: true,
            styleActiveLine: true
        });

        cm.on('change', () => {
            isDirty = true;
            updateTOC();
            if(document.getElementById('preview-pane').classList.contains('active')) updatePreview();
            setSaveStatus("● 未保存", "status-dirty");
        });

        // 监听文件名修改
        document.getElementById('filename').addEventListener('input', () => {
            isDirty = true;
            setSaveStatus("● 标题已更动", "status-dirty");
        });
    }

    async function loadAndDecrypt() {
        const statusEl = document.getElementById('status-bar');
        try {
            statusEl.innerText = "获取数据中...";
            const token = articleInfo.type === 'Private' ? userConfig.token : "";
            const gistId = articleInfo.type === 'Private' ? userConfig.gistId : ENCRYPTED_CONFIG_BlogPublic;

            const data = await GistHelper.get(token, gistId);
            const fileName = Object.keys(data.files).find(n => n.startsWith(articleInfo.idPrefix));
            if (!fileName) throw new Error("文件不存在");
            
            articleInfo.rawFileName = fileName;
            const nameObj = BlogNamingHelper.parseFileName(fileName);
            
            let title = nameObj.title;
            let content = data.files[fileName].content;

            if (articleInfo.type === 'Private') {
                title = await CryptoHelper.decrypt(title, userConfig.password);
                content = await CryptoHelper.decrypt(content, userConfig.password);
            }

            document.getElementById('static-time').innerText = articleInfo.idPrefix;
            document.getElementById('filename').value = title;
            originalTitle = title;
            cm.setValue(content);
            updateTOC();
            isDirty = false;
            statusEl.innerText = "加载成功";
            setSaveStatus("已同步", "status-success");
        } catch (err) {
            statusEl.innerText = "错误: " + err.message;
        }
    }

async function performSave(isManual = false) {
    if (!isDirty && !isManual) return;
    
    // 1. 获取用户输入的新标题（明文）
    let currentTitle = document.getElementById('filename').value.trim() || "无标题";
    
    let content = cm.getValue();
    if (!content) content = " "; // 避免 422 错误

    setSaveStatus("正在保存...", "status-syncing");

    try {
        const token = articleInfo.type === 'Private' ? userConfig.token : "";
        const gistId = articleInfo.type === 'Private' ? userConfig.gistId : ENCRYPTED_CONFIG_BlogPublic;

        let saveTitle = currentTitle;
        let saveContent = content;

        // 2. 如果是私有文章，【标题】和【内容】都要走加密流程
        if (articleInfo.type === 'Private') {
            // 加密标题（用于生成文件名）
            saveTitle = await CryptoHelper.encrypt(currentTitle, userConfig.password);
            // 加密内容
            saveContent = await CryptoHelper.encrypt(content, userConfig.password);
        }

        // 3. Base62转字符串，合成新的真实文件名（保持原始时间戳前缀不变）
        // 格式通常为: 时间戳-加密标题.md
        const newFileName_Raw = BlogNamingHelper.formatFileName(articleInfo.idPrefix, saveTitle, articleInfo.type);
        const newFileName = articleInfo.rawFileName.replace(/^(\d+).*$/, "$1") + newFileName_Raw.replace(/^\d+-/, "");

        // 4. 构建 Patch 对象
        const patchFiles = {};
        if (newFileName !== articleInfo.rawFileName) {
            // 【关键重命名逻辑】：告诉 GitHub 把旧的 Key 改名为新的 Key
            patchFiles[articleInfo.rawFileName] = {
                filename: newFileName,
                content: saveContent
            };
        } else {
            // 只是改了内容，标题没变
            patchFiles[articleInfo.rawFileName] = {
                content: saveContent
            };
        }

        // 5. 提交到 Gist
        await GistHelper.update(token, gistId, "Blog Rename and Update", patchFiles);

        // 6. 更新内存状态，防止下次保存找不到文件
        articleInfo.rawFileName = newFileName;
        isDirty = false;
        
        setSaveStatus("保存成功 " + new Date().toLocaleTimeString(), "status-success");
        document.getElementById('status-bar').innerText = "文件名已更新并加密存储";
        
    } catch (err) {
        console.error("Save Error:", err);
        setSaveStatus("保存失败: 422", "status-dirty");
        // 如果是 422，通常是因为 Gist 中已存在同名文件或 Token 权限问题
        alert("保存失败，请检查网络或标题是否重复。详情见控制台。");
    }
}

    function setSaveStatus(text, className) {
        const el = document.getElementById('auto-save-status');
        el.innerText = text;
        el.className = "save-status " + className;
    }

    function togglePreview() {
        document.getElementById('preview-pane').classList.toggle('active');
        updatePreview();
    }

    function updatePreview() {
        const preview = document.getElementById('preview-pane');
        if (!preview.classList.contains('active')) return;
        preview.innerHTML = marked.parse(cm.getValue());
    }

    function updateTOC() {
        const lines = cm.getValue().split('\n');
        let html = '';
        lines.forEach((line, i) => {
            const m = line.match(/^(#{1,2})\s+(.*)/);
            if (m) {
                const level = m[1].length;
                const text = m[2].replace(/<[^>]*>/g, '').trim();
                html += `<a class="toc-item toc-h${level}" onclick="cm.setCursor(${i},0);cm.focus();">${text}</a>`;
            }
        });
        document.getElementById('toc-pane').innerHTML = html;
    }

function exportFile(ext) {
    const title = document.getElementById('filename').value || '未命名';
    const content = cm.getValue(); // 导出用户看到的明文
    const blob = new Blob([content], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${articleInfo.idPrefix}-${title}.${ext}`; // 建议带上时间戳方便整理
    a.click();
    URL.revokeObjectURL(url);
}

    function autoSave() { performSave(false); }
    function manualSave() { performSave(true); }
</script>
</body>
</html>
