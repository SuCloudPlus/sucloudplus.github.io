<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>编辑器 - 加密博客系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <style>
        :root { --bg: #f8f9fb; --border: #e1e4e8; --accent: #2188ff; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* 顶部导航 */
        .top-nav { background: #fff; border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 10; }
        .nav-row-1 { display: flex; align-items: center; padding: 10px 20px; gap: 12px; border-bottom: 1px solid #f0f0f0; }
        .nav-row-2 { display: flex; align-items: center; padding: 6px 20px; gap: 15px; background: #fafbfc; border-bottom: 1px solid var(--border); }
        
        .name-editor-wrapper { display: flex; align-items: center; gap: 8px; flex: 1; max-width: 400px; }
        .input-group { display: flex; align-items: center; background: #fff; border: 1px solid var(--border); border-radius: 4px; padding: 0 8px; width: 100%; }
        #static-time { color: #888; font-family: monospace; font-size: 12px; padding-right: 8px; border-right: 1px solid #ddd; user-select: none; }
        
        input[type="text"], input[type="number"] { border: none; background: transparent; padding: 6px 8px; outline: none; font-size: 13px; }
        #filename { width: 100%; font-weight: 500; }
        
        /* 按钮与工具栏 */
        .btn { padding: 4px 10px; border: 1px solid var(--border); background: #fff; border-radius: 4px; cursor: pointer; font-size: 12px; display: inline-flex; align-items: center; transition: 0.2s; }
        .btn:hover { background: #f3f4f6; }
        .btn-primary { background: var(--accent); color: #fff; border: none; }
        .btn-save { background: #28a745; color: #fff; border: none; }
        
        .tool-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #666; }
        .input-tool { border: 1px solid var(--border) !important; background: #fff !important; border-radius: 4px; width: 100px; height: 24px; }

        /* 主舞台 */
        .main-stage { display: flex; flex: 1; overflow: hidden; }
        #toc-pane { width: 200px; border-right: 1px solid var(--border); overflow-y: auto; padding: 15px; background: #fff; font-size: 13px; }
        .toc-item { display: block; color: #444; text-decoration: none; padding: 4px 0; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .toc-item:hover { color: var(--accent); }
        
        #workspace { flex: 1; position: relative; display: flex; flex-direction: column; }
        .CodeMirror { flex: 1; height: 100% !important; font-size: 15px; line-height: 1.6; }
        
        #preview-pane { width: 0; overflow-y: auto; background: #fff; transition: width 0.3s; }
        #preview-pane.active { width: 45%; border-left: 1px solid var(--border); padding: 25px; }

        #status-bar { margin-left: auto; font-size: 12px; color: #999; }
    </style>

    <script src="https://sucloudplus.github.io/assets/config.js"></script> 
    <script src="https://sucloudplus.github.io/assets/crypto-helper.js"></script>
    <script src="https://sucloudplus.github.io/assets/gist-helper.js"></script>
    <script src="https://sucloudplus.github.io/assets/blog-naming-helper.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/markdown/markdown.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/search/searchcursor.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<header class="top-nav">
    <div class="nav-row-1">
        <button class="btn" onclick="location.href='index.html'">← 返回</button>
        <div class="name-editor-wrapper">
            <div class="input-group">
                <span id="static-time">NEW</span>
                <input type="text" id="filename" placeholder="文章标题...">
            </div>
        </div>
        <div style="margin-left: auto; display: flex; gap: 8px;">
            <button class="btn" onclick="exportFile('md')">导出 .MD</button>
            <button class="btn" onclick="togglePreview()">预览 (Alt+P)</button>
            <button class="btn btn-save" onclick="manualSave()">立即保存 (Ctrl+S)</button>
        </div>
    </div>
    
    <div class="nav-row-2">
        <div class="tool-item">
            <span>查找:</span>
            <input type="text" id="search-box" class="input-tool" placeholder="输入并回车..." onkeydown="if(event.keyCode==13) doSearch()">
        </div>
        <div class="tool-item">
            <span>跳转行:</span>
            <input type="number" id="jump-box" class="input-tool" placeholder="行号..." onchange="gotoLine(this.value)">
        </div>
        <div id="status-text" style="font-size: 11px; color: var(--accent); font-weight: 500;">编辑器就绪</div>
        <div id="status-bar">行: 1 | 字数: 0</div>
    </div>
</header>

<div class="main-stage">
    <nav id="toc-pane"></nav>
    <main id="workspace">
        <textarea id="real-input"></textarea>
    </main>
    <div id="preview-pane" class="markdown-body"></div>
</div>

<script>
    let cm, userConfig = null, articleInfo = { type: '', idPrefix: '', rawFileName: '' };
    let isDirty = false;

    window.onload = async function() {
        const params = new URLSearchParams(window.location.search);
        articleInfo.type = params.get('type') || 'Public';
        articleInfo.idPrefix = params.get('id');

        const session = getCookie("blog_session");
        if (session) userConfig = JSON.parse(decodeURIComponent(session));

        if (articleInfo.type === 'Private' && !userConfig) {
            alert("请登录后再编辑私密文章");
            location.href = 'index.html';
            return;
        }

        initEditor();
        if (articleInfo.idPrefix !== 'new') {
            await loadAndDecrypt();
        }
        
        // 自动保存定时器
        setInterval(() => performSave(false), 60000);
        
        // 快捷键绑定
        window.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); manualSave(); }
            if (e.altKey && e.key === 'p') { e.preventDefault(); togglePreview(); }
        });
    };

    function initEditor() {
        cm = CodeMirror.fromTextArea(document.getElementById('real-input'), {
            mode: 'markdown', 
            lineNumbers: true, 
            lineWrapping: true, 
            styleActiveLine: true,
            viewportMargin: Infinity
        });

        cm.on('change', () => { 
            isDirty = true; 
            updateTOC(); 
            updateStatus();
            if (document.getElementById('preview-pane').classList.contains('active')) {
                renderPreview();
            }
        });

        cm.on('cursorActivity', updateStatus);
        document.getElementById('filename').addEventListener('input', () => isDirty = true);
    }

    // --- 核心逻辑：加载与保存 ---

    async function loadAndDecrypt() {
        try {
            document.getElementById('status-text').innerText = "同步中...";
            const token = userConfig ? userConfig.token : "";
            const gistId = articleInfo.type === 'Private' ? userConfig.gistId : ENCRYPTED_CONFIG_BlogPublic;
            const data = await GistHelper.get(token, gistId);
            
            const fileName = Object.keys(data.files).find(n => n.startsWith(articleInfo.idPrefix));
            if (!fileName) throw new Error("未找到对应文章");

            articleInfo.rawFileName = fileName;
            const nameObj = BlogNamingHelper.parseFileName(fileName);
            let title = nameObj.title, content = data.files[fileName].content;

            if (articleInfo.type === 'Private') {
                title = await CryptoHelper.decrypt(title, userConfig.password);
                content = await CryptoHelper.decrypt(content, userConfig.password);
            }

            document.getElementById('static-time').innerText = articleInfo.idPrefix;
            document.getElementById('filename').value = title;
            cm.setValue(content);
            isDirty = false;
            document.getElementById('status-text').innerText = "已加载最新版本";
        } catch (err) { 
            console.error(err);
            document.getElementById('status-text').innerText = "加载失败: " + err.message;
        }
    }

    async function performSave(isManual = false) {
        if (!isDirty && !isManual) return;
        
        const session = getCookie("blog_session");
        if (!session) {
            document.getElementById('status-text').innerText = "错误：未登录无法保存";
            return;
        }
        const authData = JSON.parse(decodeURIComponent(session));
        const token = authData.token;

        const currentTitle = document.getElementById('filename').value.trim() || "无题";
        let content = cm.getValue() || " ";
        document.getElementById('status-text').innerText = "正在保存...";

        try {
            const gistId = articleInfo.type === 'Private' ? authData.gistId : ENCRYPTED_CONFIG_BlogPublic;
            let titleToEncode = currentTitle, saveContent = content;

            if (articleInfo.type === 'Private') {
                titleToEncode = await CryptoHelper.encrypt(currentTitle, authData.password);
                saveContent = await CryptoHelper.encrypt(content, authData.password);
            }

            if (articleInfo.idPrefix === 'new') {
                articleInfo.idPrefix = BlogNamingHelper.generateTimestampID();
                document.getElementById('static-time').innerText = articleInfo.idPrefix;
            }

            const b62Title = BlogNamingHelper.encodeBase62(titleToEncode);
            const newFileName = BlogNamingHelper.formatFileName(articleInfo.idPrefix, b62Title);

            const patchFiles = {};
            if (articleInfo.rawFileName && articleInfo.rawFileName !== newFileName) {
                patchFiles[articleInfo.rawFileName] = null;
                patchFiles[newFileName] = { content: saveContent };
            } else {
                patchFiles[newFileName] = { content: saveContent };
            }

            await GistHelper.update(token, gistId, "Cloud Save", patchFiles);
            
            articleInfo.rawFileName = newFileName;
            isDirty = false;
            document.getElementById('status-text').innerText = "云端同步成功 " + new Date().toLocaleTimeString();
            
            if (window.location.search.includes('id=new')) {
                const newUrl = `?id=${articleInfo.idPrefix}&type=${articleInfo.type}`;
                window.history.replaceState(null, '', newUrl);
            }
        } catch (err) {
            document.getElementById('status-text').innerText = "同步失败: " + err.message;
        }
    }

    // --- 辅助功能：查找、跳转、导出 ---

    function doSearch() {
        const q = document.getElementById('search-box').value;
        if(!q) return;
        const cursor = cm.getSearchCursor(q);
        if (cursor.findNext()) {
            cm.setSelection(cursor.from(), cursor.to());
            cm.scrollIntoView({from: cursor.from(), to: cursor.to()}, 150);
        } else {
            // 如果到底了，从头找
            const firstCursor = cm.getSearchCursor(q, {line:0, ch:0});
            if(firstCursor.findNext()) {
                cm.setSelection(firstCursor.from(), firstCursor.to());
                cm.scrollIntoView({from: firstCursor.from(), to: firstCursor.to()}, 150);
            }
        }
    }

    function gotoLine(n) {
        const line = parseInt(n) - 1;
        if (line >= 0 && line < cm.lineCount()) {
            cm.setCursor(line, 0);
            cm.focus();
        }
    }

    function exportFile(ext) {
        const title = document.getElementById('filename').value || "untitled";
        const content = cm.getValue();
        const blob = new Blob([content], {type: 'text/markdown'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${title}.${ext}`;
        a.click();
    }

    function updateStatus() {
        const cursor = cm.getCursor();
        document.getElementById('status-bar').innerText = `行: ${cursor.line + 1} | 字数: ${cm.getValue().length}`;
    }

    // --- 预览与目录 ---

    function togglePreview() {
        const pane = document.getElementById('preview-pane');
        pane.classList.toggle('active');
        if (pane.classList.contains('active')) renderPreview();
    }

    function renderPreview() {
        const pane = document.getElementById('preview-pane');
        pane.innerHTML = marked.parse(cm.getValue());
    }

    function updateTOC() {
        const lines = cm.getValue().split('\n');
        let html = '';
        lines.forEach((line, i) => {
            const m = line.match(/^(#{1,3})\s+(.*)/);
            if (m) {
                const level = m[1].length;
                const title = m[2].replace(/[#*`]/g, '');
                html += `<div class="toc-item" style="padding-left: ${(level-1)*12}px" onclick="gotoLine(${i+1})">${title}</div>`;
            }
        });
        document.getElementById('toc-pane').innerHTML = html || '<div style="color:#ccc">暂无目录</div>';
    }

    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
    }

    function manualSave() { performSave(true); }
</script>
</body>
</html>
